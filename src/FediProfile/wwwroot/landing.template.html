<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{INSTANCE_NAME}} — Powered by FediProfile</title>
    <meta name="description" content="{{INSTANCE_NAME}} on FediProfile">
    <style>
        :root {
            --bg: #0a0a0f;
            --ink: #e4e4e7;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --accent-soft: rgba(139, 92, 246, 0.12);
            --card: #18181b;
            --card-hover: #27272a;
            --border: #3f3f46;
            --shadow: rgba(0, 0, 0, 0.5);
            --muted: #a1a1aa;
            --success: #34d399;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #fafafa;
                --ink: #18181b;
                --accent: #8b5cf6;
                --accent-hover: #7c3aed;
                --accent-soft: rgba(139, 92, 246, 0.08);
                --card: #ffffff;
                --card-hover: #f4f4f5;
                --border: #e4e4e7;
                --shadow: rgba(0, 0, 0, 0.08);
                --muted: #71717a;
                --success: #059669;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── Nav ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        @media (prefers-color-scheme: light) {
            nav { background: rgba(250, 250, 250, 0.85); }
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--ink);
            text-decoration: none;
        }

        .nav-brand svg { width: 28px; height: 28px; }

        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--ink); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--border);
        }
        .btn-ghost:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-sm { padding: 8px 18px; font-size: 0.875rem; border-radius: 8px; }

        /* ── Hero ── */
        .hero {
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 140px 24px 60px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            pointer-events: none;
            animation: heroPulse 6s ease-in-out infinite;
        }

        @keyframes heroPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 20px;
            animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .hero h1 .gradient {
            background: linear-gradient(135deg, var(--accent) 0%, #c084fc 50%, #f0abfc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: clamp(1.05rem, 2vw, 1.25rem);
            color: var(--muted);
            max-width: 560px;
            margin: 0 auto 40px;
            animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Content ── */
        .content-section {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px 100px;
        }

        .content-body {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 48px;
            line-height: 1.75;
        }

        .content-body h2,
        .content-body h3 {
            margin-top: 1.6rem;
            margin-bottom: 0.6rem;
            line-height: 1.25;
            font-weight: 700;
        }

        .content-body p {
            margin: 0.75rem 0;
            color: var(--muted);
        }

        .content-body a {
            color: var(--accent-hover);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .content-body code {
            background: var(--card-hover);
            border: 1px solid var(--border);
            padding: 0.15rem 0.4rem;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .content-body pre {
            background: var(--card-hover);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 10px;
            overflow: auto;
            margin: 1rem 0;
        }

        .content-body blockquote {
            margin: 1rem 0;
            padding: 0.75rem 1rem;
            border-left: 3px solid var(--accent);
            background: var(--accent-soft);
            border-radius: 0 8px 8px 0;
        }

        /* ── Footer ── */
        footer {
            padding: 40px 24px;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer .footer-links {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 16px;
        }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            nav { padding: 12px 16px; }
            .nav-links .hide-mobile { display: none; }
            .hero { padding: 120px 16px 48px; }
            .content-body { padding: 24px 20px; }
        }

        /* ── Scroll animations ── */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav>
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 8 L88 28 L88 72 L50 92 L12 72 L12 28 Z" stroke="var(--accent)" stroke-width="5" fill="none"/>
                <circle cx="50" cy="8" r="7" fill="var(--accent)"/>
                <circle cx="88" cy="28" r="7" fill="var(--accent)"/>
                <circle cx="88" cy="72" r="7" fill="var(--accent)"/>
                <circle cx="50" cy="92" r="7" fill="var(--accent)"/>
                <circle cx="12" cy="72" r="7" fill="var(--accent)"/>
                <circle cx="12" cy="28" r="7" fill="var(--accent)"/>
                <line x1="50" y1="8" x2="88" y2="72" stroke="var(--accent)" stroke-width="2.5" opacity="0.4"/>
                <line x1="88" y1="28" x2="12" y2="72" stroke="var(--accent)" stroke-width="2.5" opacity="0.4"/>
                <line x1="50" y1="92" x2="12" y2="28" stroke="var(--accent)" stroke-width="2.5" opacity="0.4"/>
                <circle cx="50" cy="50" r="10" fill="var(--accent)" opacity="0.7"/>
            </svg>
            {{INSTANCE_NAME}}
        </a>
        <div class="nav-links">
            <a href="https://github.com/tryvocalcat/fediprofile" target="_blank" class="hide-mobile">GitHub</a>
            <a href="/login" class="btn btn-sm btn-primary" style="color: white">Get Started</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1><span class="gradient">{{INSTANCE_NAME}}</span></h1>
        <p class="hero-sub">A federated profile hub you can own and operate.</p>
        <div class="hero-actions">
            <a href="/login" class="btn btn-primary">Create Your Profile &rarr;</a>
        </div>
    </section>

    <!-- Instance content -->
    <div class="content-section">
        <article class="content-body reveal">
{{INSTANCE_MARKDOWN_HTML}}
        </article>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="https://github.com/tryvocalcat/fediprofile" target="_blank">GitHub</a>
            <a href="/login">Login</a>
        </div>
        <p>Powered by <a href="https://fediprofile.com">FediProfile</a> &mdash; Open source, federated, yours.</p>
    </footer>

    <script>
        // Scroll-reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
