<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FediProfile</title>
    <link rel="stylesheet" href="/assets/theme-base.css" />
    <style>
      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin: 0 auto 1rem;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="avatar-wrapper">
        <img id="profile-avatar" class="profile-avatar" alt="" style="display:none" />
        <button id="qr-profile" class="qr-avatar-btn" title="Share via QR Code">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" stroke="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
        </button>
      </div>
      <h1 id="profile-name">Loading...</h1>
      <div class="fedi-handle-hero">
        <span data-fedi-address></span>
        <button class="copy-fedi-btn" title="Copy to clipboard">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <p class="subtitle" id="profile-bio"></p>
      
      <div id="profile-container" class="profile-container">
        <p>Loading your profile...</p>
      </div>

      <div id="badges-section" class="badges-section" style="display:none">
        <h2 class="badges-heading">Badges</h2>
        <div id="badges-container" class="badges-container"></div>
      </div>

      <div id="recent-posts-section" class="recent-posts-section" style="display:none">
        <h2 class="recent-posts-heading">Recent Activity</h2>
        <div id="recent-posts-container" class="recent-posts-container"></div>
      </div>

      <div class="info-section" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <p class="fedi-handle">Follow me in the fediverse: <strong data-fedi-address></strong> <button class="copy-fedi-btn" title="Copy to clipboard"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></p>
          <p class="fedi-note">Not in the fediverse? <a href="https://joinmastodon.org" target="_blank">Join now</a></p>
        </div>
        <button id="share-profile" class="share-btn" title="Share this profile">
          <svg viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
      </div>

      <div class="info-section">
        <p>Powered by <a href="/">FediProfile</a> &mdash; <a href="/login">Create your own</a></p>
      </div>
    </main>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="qr-modal-overlay" style="display:none">
      <div class="qr-modal">
        <button id="qr-close" class="qr-close" title="Close">&times;</button>
        <h2 class="qr-title">Scan to view profile</h2>
        <div id="qr-canvas" class="qr-canvas"></div>
        <p class="qr-url" id="qr-url"></p>
        <button id="qr-download" class="qr-download-btn">Download QR Code</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="/assets/profile.js"></script>
  </body>
</html>
