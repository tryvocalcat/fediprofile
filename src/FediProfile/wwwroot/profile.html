<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FediProfile</title>
    <link rel="stylesheet" href="/assets/theme-base.css" />
    <style>
      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        margin: 0 auto 1rem;
        display: block;
      }
      .gamification-section {
        margin: 1.5rem 0;
      }

      .gamification-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
      }

      .gamification-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 0.9rem 0.5rem;
        text-align: center;
        color: var(--ink);
        box-shadow: 0 4px 12px var(--shadow);
        transition:
          transform 250ms cubic-bezier(0.16, 1, 0.3, 1),
          background 250ms ease,
          border-color 250ms ease,
          box-shadow 250ms ease;
      }

      .gamification-icon {
        font-size: 1.3rem;
        margin-bottom: 0.35rem;
      }

      .gamification-value {
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.2;
        color: inherit;
        transition: color 250ms ease;
      }

      .gamification-label {
        font-size: 0.75rem;
        opacity: 0.75;
        margin-top: 0.2rem;
        color: inherit;
      }

      .xp-progress {
        margin-top: 1rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0.8rem;
        color: var(--ink);
        box-shadow: 0 4px 12px var(--shadow);
        transition:
          transform 250ms cubic-bezier(0.16, 1, 0.3, 1),
          background 250ms ease,
          border-color 250ms ease,
          box-shadow 250ms ease;
      }

      .xp-progress-header {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        font-size: 0.78rem;
        opacity: 0.9;
        margin-bottom: 0.5rem;
      }

      .xp-progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: var(--border);
      }

      .xp-progress-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--accent);
      }

      .featured-achievements-section {
        margin: 1.5rem 0;
      }

      .featured-achievements-heading {
        font-size: 1rem;
        margin-bottom: 0.75rem;
        text-align: center;
        color: var(--accent);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .featured-achievements-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
      }

      .featured-achievement-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 0.9rem 0.7rem;
        text-align: center;
        color: var(--ink);
        box-shadow: 0 4px 12px var(--shadow);
        transition:
          transform 250ms cubic-bezier(0.16, 1, 0.3, 1),
          background 250ms ease,
          border-color 250ms ease,
          box-shadow 250ms ease;
      }

      .featured-achievement-icon {
        font-size: 1.5rem;
        margin-bottom: 0.35rem;
      }

      .featured-achievement-name {
        font-size: 0.82rem;
        font-weight: 700;
        color: inherit;
        transition: color 250ms ease;
      }

      .featured-achievement-description {
        display: none;
      }

      .featured-achievement-image {
        width: 48px;
        height: 48px;
        object-fit: contain;
        margin-bottom: 0.45rem;
      }

      @media (hover: hover) {
        .gamification-card:hover,
        .xp-progress:hover,
        .featured-achievement-card:hover {
          background: var(--card-hover);
          border-color: var(--accent);
          transform: translate(-2px, -2px);
          box-shadow: 5px 5px 0 var(--accent);
        }

        .gamification-card:hover .gamification-value,
        .featured-achievement-card:hover .featured-achievement-name {
          color: var(--accent);
        }
      }

      @media (max-width: 640px) {
        .gamification-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .featured-achievements-container {
          grid-template-columns: 1fr;
        }

        .xp-progress-header {
          flex-direction: column;
          gap: 0.25rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="avatar-wrapper">
        <img id="profile-avatar" class="profile-avatar" alt="" style="display:none" />
        <button id="qr-profile" class="qr-avatar-btn" title="Share via QR Code">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" stroke="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
        </button>
      </div>
      <h1 id="profile-name">Loading...</h1>
      <div class="fedi-handle-hero">
        <span data-fedi-address></span>
        <button class="copy-fedi-btn" title="Copy to clipboard">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <p class="subtitle" id="profile-bio"></p>

      <!-- Gamification Stats -->
      <section id="gamification-section" class="gamification-section" style="display:none">
        <div class="gamification-grid">
          <div class="gamification-card">
            <div class="gamification-icon">🔥</div>
            <div class="gamification-value" id="streak-days">0</div>
            <div class="gamification-label">Streak</div>
          </div>

          <div class="gamification-card">
            <div class="gamification-icon">⭐</div>
            <div class="gamification-value" id="profile-level">1</div>
            <div class="gamification-label">Level</div>
          </div>

          <div class="gamification-card">
            <div class="gamification-icon">⚡</div>
            <div class="gamification-value" id="profile-xp">0</div>
            <div class="gamification-label">XP</div>
          </div>

          <div class="gamification-card">
            <div class="gamification-icon">🏆</div>
            <div class="gamification-value" id="profile-achievements-count">0</div>
            <div class="gamification-label">Badges</div>
          </div>
        </div>

        <div class="xp-progress">
          <div class="xp-progress-header">
            <span id="xp-progress-label">XP Progress</span>
            <span id="xp-progress-numbers">0 / 100 XP</span>
          </div>
          <div class="xp-progress-track">
            <div id="xp-progress-fill" class="xp-progress-fill" style="width:0%"></div>
          </div>
        </div>
      </section>

      <!-- Featured Badges -->
      <section id="featured-achievements-section" class="featured-achievements-section" style="display:none">
        <h2 class="featured-achievements-heading">Featured Badges</h2>
        <div id="featured-achievements-container" class="featured-achievements-container"></div>
      </section>

      <div id="profile-container" class="profile-container">
        <p>Loading your profile...</p>
      </div>

      <div id="badges-section" class="badges-section" style="display:none">
        <h2 class="badges-heading">Badges</h2>
        <div id="badges-container" class="badges-contaImpr"></div>
      </div>

      <div id="recent-posts-section" class="recent-posts-section" style="display:none">
        <h2 class="recent-posts-heading">Recent Activity</h2>
        <div id="recent-posts-container" class="recent-posts-container"></div>
      </div>

      <div class="info-section" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <p class="fedi-handle">Follow me in the fediverse: <strong data-fedi-address></strong> <button class="copy-fedi-btn" title="Copy to clipboard"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></p>
          <p class="fedi-note">Not in the fediverse? <a href="https://joinmastodon.org" target="_blank">Join now</a></p>
        </div>
        <button id="share-profile" class="share-btn" title="Share this profile">
          <svg viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
      </div>

      <div class="info-section">
        <p>Powered by <a href="/">FediProfile</a> &mdash; <a href="/login">Create your own</a></p>
      </div>
    </main>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="qr-modal-overlay" style="display:none">
      <div class="qr-modal">
        <button id="qr-close" class="qr-close" title="Close">&times;</button>
        <h2 class="qr-title">Scan to view profile</h2>
        <div id="qr-canvas" class="qr-canvas"></div>
        <p class="qr-url" id="qr-url"></p>
        <button id="qr-download" class="qr-download-btn">Download QR Code</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="/assets/profile.js?v=gamification-1"></script>
  </body>
</html>
